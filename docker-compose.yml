services:
  postgres:
    image: postgres:16-alpine
    container_name: vamp-bills-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vamp
      POSTGRES_PASSWORD: vamp
      POSTGRES_DB: vamp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vamp -d vamp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
